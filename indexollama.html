<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GPS Dashboard</title>

<link rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
}

#dashboard{
    padding:15px;
}

h1{
    margin-top:0;
    text-align:center;
}

.info{
    background:#222;
    padding:10px;
    margin-bottom:8px;
    border-radius:8px;
}

#map{
    width:100%;
    height:500px;
    border-radius:12px;
    overflow:hidden;
}

.car-marker{
    font-size:34px;
    width:40px;
    height:40px;
    line-height:40px;
    text-align:center;
    transform-origin:center center;
}

</style>
</head>
<body>

<div id="dashboard">

    <h1>Dashboard GPS</h1>

    <div class="info">
        Tempo: <span id="tempo">0</span> min
    </div>

    <div class="info">
        Altitude: <span id="altitude">N/A</span> m
    </div>

    <div class="info">
        Velocidade Média: <span id="velocidade-media">0</span> km/h
    </div>

    <div class="info">
        Coordenadas: <span id="coordenadas">0,0</span>
    </div>

    <div class="info">
        Direção: <span id="heading">0°</span>
    </div>

    <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map;
let marker;

let startTime;
let lastPosition = null;
let totalDistance = 0;

const tempo =
    document.getElementById("tempo");

const altitude =
    document.getElementById("altitude");

const velocidadeMedia =
    document.getElementById("velocidade-media");

const coordenadas =
    document.getElementById("coordenadas");

const headingText =
    document.getElementById("heading");

function deg2rad(deg){
    return deg * (Math.PI / 180);
}

function rad2deg(rad){
    return rad * (180 / Math.PI);
}

function getDistanceFromLatLon(
    lat1,
    lon1,
    lat2,
    lon2
){

    const R = 6371;

    const dLat =
        deg2rad(lat2-lat1);

    const dLon =
        deg2rad(lon2-lon1);

    const a =
        Math.sin(dLat/2) *
        Math.sin(dLat/2)
        +
        Math.cos(deg2rad(lat1))
        *
        Math.cos(deg2rad(lat2))
        *
        Math.sin(dLon/2)
        *
        Math.sin(dLon/2);

    const c =
        2 *
        Math.atan2(
            Math.sqrt(a),
            Math.sqrt(1-a)
        );

    return R*c;
}

function calculateBearing(
    lat1,
    lon1,
    lat2,
    lon2
){

    const dLon =
        deg2rad(lon2-lon1);

    const y =
        Math.sin(dLon) *
        Math.cos(deg2rad(lat2));

    const x =
        Math.cos(deg2rad(lat1))
        *
        Math.sin(deg2rad(lat2))
        -
        Math.sin(deg2rad(lat1))
        *
        Math.cos(deg2rad(lat2))
        *
        Math.cos(dLon);

    let bearing =
        rad2deg(
            Math.atan2(y,x)
        );

    return (bearing + 360) % 360;
}

function startTimer(){

    startTime =
        Date.now();

    updateTimer();
}

function updateTimer(){

    if(!startTime) return;

    const elapsedSeconds =
        (Date.now()-startTime)/1000;

    tempo.textContent =
        Math.floor(elapsedSeconds/60);

    setTimeout(
        updateTimer,
        1000
    );
}

function createMarker(lat,lng){

    const icon = L.divIcon({
        className:'',
        html:`
            <div
                id="car-marker"
                class="car-marker">
                🚗
            </div>
        `,
        iconSize:[40,40],
        iconAnchor:[20,20]
    });

    marker =
        L.marker(
            [lat,lng],
            {icon}
        )
        .addTo(map);
}

function rotateCar(angle){

    const car =
        document.getElementById(
            "car-marker"
        );

    if(car){

        car.style.transform =
            `rotate(${angle}deg)`;
    }
}

function updateDashboard(position){

    const lat =
        position.coords.latitude;

    const lng =
        position.coords.longitude;

    let gpsHeading =
        position.coords.heading;

    if(
        (gpsHeading === null ||
        isNaN(gpsHeading))
        &&
        lastPosition
    ){

        gpsHeading =
            calculateBearing(
                lastPosition.coords.latitude,
                lastPosition.coords.longitude,
                lat,
                lng
            );
    }

    if(
        gpsHeading === null ||
        isNaN(gpsHeading)
    ){
        gpsHeading = 0;
    }

    coordenadas.textContent =
        `${lat.toFixed(6)}, ${lng.toFixed(6)}`;

    headingText.textContent =
        `${Math.round(gpsHeading)}°`;

    altitude.textContent =
        position.coords.altitude !== null
        ? position.coords.altitude.toFixed(2)
        : "N/A";

    if(
        lastPosition &&
        startTime
    ){

        const distance =
            getDistanceFromLatLon(
                lastPosition.coords.latitude,
                lastPosition.coords.longitude,
                lat,
                lng
            );

        totalDistance += distance;

        const elapsedSeconds =
            (Date.now()-startTime)
            /1000;

        const avgSpeed =
            (totalDistance /
            elapsedSeconds)
            * 3600;

        velocidadeMedia.textContent =
            avgSpeed.toFixed(2);
    }

    if(!marker){

        createMarker(lat,lng);

        map.setView(
            [lat,lng],
            18
        );

    }else{

        marker.setLatLng(
            [lat,lng]
        );

        map.panTo(
            [lat,lng],
            {
                animate:true,
                duration:0.5
            }
        );
    }

    rotateCar(gpsHeading);

    lastPosition =
        position;
}

function gpsError(error){

    console.error(error);

    alert(
        "Erro ao obter localização.\n\n" +
        error.message
    );
}

function initMap(){

    map =
        L.map("map");

    L.tileLayer(
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
            maxZoom:19,
            attribution:
                "© OpenStreetMap"
        }
    ).addTo(map);

    map.setView(
        [-23.55052,-46.63330],
        13
    );
}

document.addEventListener(
    "DOMContentLoaded",
    () => {

        initMap();

        startTimer();

        if(
            !(
                "geolocation"
                in navigator
            )
        ){

            alert(
                "Geolocalização não suportada."
            );

            return;
        }

        navigator.geolocation.watchPosition(

            updateDashboard,

            gpsError,

            {
                enableHighAccuracy:true,
                timeout:15000,
                maximumAge:0
            }

        );

    }
);

</script>

</body>
</html>
